<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashFlow Community</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#141e30,#243b55);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    background:#1f2a40;
    padding:25px;
    border-radius:15px;
    width:340px;
    text-align:center;
}

input{
    width:95%;
    padding:10px;
    margin:6px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#00c853;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.toggle{
    margin-top:10px;
    cursor:pointer;
    color:#00e5ff;
    font-size:14px;
}

#dashboard{
    display:none;
}
</style>
</head>

<body>
       <input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">
<button onclick="login()">Login</button>
    

<div class="box" id="authBox">

<h2 id="formTitle">Login</h2>

<div id="extraFields" style="display:none;">
<input type="text" id="username" placeholder="Username">
<input type="text" id="mobile" placeholder="Mobile Number">
</div>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">
<input type="password" id="confirmPassword" placeholder="Confirm Password" style="display:none;">

<button onclick="handleAuth()">Login</button>

<div class="toggle" onclick="toggleForm()">
Don't have account? Signup
</div>

<p id="msg"></p>

</div>

<div class="box" id="dashboard">
<h2>Welcome 🎉</h2>
<p id="welcomeUser"></p>
<button onclick="logout()">Logout</button>
</div>

<script>
let isLogin = true;

function toggleForm(){
    isLogin = !isLogin;

    document.getElementById("formTitle").innerText = isLogin ? "Login" : "Signup";
    document.querySelector("button").innerText = isLogin ? "Login" : "Signup";
    document.querySelector(".toggle").innerText = 
        isLogin ? "Don't have account? Signup" : "Already have account? Login";

    document.getElementById("extraFields").style.display = isLogin ? "none" : "block";
    document.getElementById("confirmPassword").style.display = isLogin ? "none" : "block";
}

function handleAuth(){

    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    let users = JSON.parse(localStorage.getItem("users")) || {};

    if(isLogin){

        let email = prompt("Enter your registered email:");

        if(users[email] && users[email].password === password){
            loginSuccess(users[email].username);
        }else{
            document.getElementById("msg").innerText="Invalid Email or Password!";
        }

    }else{

        let username = document.getElementById("username").value;
        let email = document.getElementById("email").value;
        let mobile = document.getElementById("mobile").value;

        if(username==="" || email==="" || mobile==="" || password==="" || confirmPassword===""){
            document.getElementById("msg").innerText="Fill all fields!";
            return;
        }

        if(password !== confirmPassword){
            document.getElementById("msg").innerText="Passwords do not match!";
            return;
        }

        if(mobile.length !== 10){
            document.getElementById("msg").innerText="Invalid mobile number!";
            return;
        }

        if(users[email]){
            document.getElementById("msg").innerText="Email already registered!";
            return;
        }

        users[email] = {
            username: username,
            mobile: mobile,
            password: password
        };

        localStorage.setItem("users", JSON.stringify(users));

        document.getElementById("msg").innerText="Signup Successful! Please Login.";
        toggleForm();
    }
}

function loginSuccess(user){
    localStorage.setItem("loggedInUser", user);
    showDashboard(user);
}

function showDashboard(user){
    document.getElementById("authBox").style.display="none";
    document.getElementById("dashboard").style.display="block";
    document.getElementById("welcomeUser").innerText="Hello, "+user;
}

function logout(){
    localStorage.removeItem("loggedInUser");
    document.getElementById("dashboard").style.display="none";
    document.getElementById("authBox").style.display="block";
}

window.onload = function(){
    let user = localStorage.getItem("loggedInUser");
    if(user){
        showDashboard(user);
    }
}
</script>

</body>
</html>
