<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashFlow Community</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#141e30,#243b55);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#1f2a40;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#00c853;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.toggle{
    margin-top:15px;
    font-size:14px;
    cursor:pointer;
    color:#00e5ff;
}

#dashboard{
    display:none;
}
</style>
</head>

<body>

<div class="box" id="authBox">

<h2 id="formTitle">Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="handleAuth()">Login</button>

<div class="toggle" onclick="toggleForm()">
Don't have account? Signup
</div>

<p id="msg"></p>

</div>

<div class="box" id="dashboard">
<h2>Welcome 🎉</h2>
<p id="welcomeUser"></p>
<button onclick="logout()">Logout</button>
</div>

<script>
let isLogin = true;

function toggleForm(){
    isLogin = !isLogin;
    document.getElementById("formTitle").innerText = isLogin ? "Login" : "Signup";
    document.querySelector("button").innerText = isLogin ? "Login" : "Signup";
    document.querySelector(".toggle").innerText = 
        isLogin ? "Don't have account? Signup" : "Already have account? Login";
}

function handleAuth(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user==="" || pass===""){
        document.getElementById("msg").innerText="Fill all fields!";
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || {};

    if(isLogin){
        if(users[user] && users[user] === pass){
            loginSuccess(user);
        }else{
            document.getElementById("msg").innerText="Invalid credentials!";
        }
    }else{
        if(users[user]){
            document.getElementById("msg").innerText="User already exists!";
        }else{
            users[user] = pass;
            localStorage.setItem("users", JSON.stringify(users));
            document.getElementById("msg").innerText="Signup successful! Now login.";
            toggleForm();
        }
    }
}

function loginSuccess(user){
    localStorage.setItem("loggedInUser", user);
    showDashboard(user);
}

function showDashboard(user){
    document.getElementById("authBox").style.display="none";
    document.getElementById("dashboard").style.display="block";
    document.getElementById("welcomeUser").innerText="Hello, "+user;
}

function logout(){
    localStorage.removeItem("loggedInUser");
    document.getElementById("dashboard").style.display="none";
    document.getElementById("authBox").style.display="block";
}

window.onload = function(){
    let user = localStorage.getItem("loggedInUser");
    if(user){
        showDashboard(user);
    }
}
</script>

</body>
</html>
